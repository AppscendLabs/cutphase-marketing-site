  <circle cx="206" cy="336" r="8" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>

  <!-- CTA Button -->
  <rect x="16" y="400" width="208" height="44" rx="12" fill="#D44035"/>
  <text x="120" y="427" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="700">Start Cutting Phase</text>

  <!-- Home indicator -->
