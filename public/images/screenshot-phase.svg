<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="480" rx="28" fill="#0f0f0f"/>

  <!-- Header -->
  <text x="24" y="52" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" letter-spacing="0.5">CHOOSE YOUR PHASE</text>
