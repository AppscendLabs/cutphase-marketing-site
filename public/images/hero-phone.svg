<svg width="300" height="620" viewBox="0 0 300 620" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone body -->
  <rect x="4" y="4" width="292" height="612" rx="46" fill="#181818" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="12" y="18" width="276" height="584" rx="38" fill="#0f0f0f"/>
  <!-- Dynamic island -->
  <rect x="108" y="28" width="84" height="24" rx="12" fill="#181818"/>

  <!-- Status bar time -->
  <text x="36" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">9:41</text>

  <!-- App header -->
  <text x="30" y="88" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="0.5">CUTPHASE</text>
  <text x="30" y="112" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="19" fill="#ffffff">Good morning, Alex</text>

  <!-- Phase badge -->
  <rect x="30" y="126" width="74" height="22" rx="11" fill="rgba(212,64,53,0.1)"/>
  <text x="67" y="141" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D44035" text-anchor="middle" font-weight="700" letter-spacing="0.8">CUTTING</text>

  <!-- Progress ring background -->
  <circle cx="150" cy="262" r="82" fill="none" stroke="#1e1e1e" stroke-width="10"/>
  <!-- Progress ring fill (~75%) -->
  <circle cx="150" cy="262" r="82" fill="none" stroke="#D44035" stroke-width="10"
    stroke-dasharray="515 172"
    stroke-linecap="round"
    transform="rotate(-90 150 262)"/>

  <!-- Ring labels -->
  <text x="150" y="251" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#ffffff" font-weight="800">1,840</text>
  <text x="150" y="271" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">of 2,100 kcal</text>
  <text x="150" y="289" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#D44035" font-weight="600">Day 12 · Cut Phase</text>

  <!-- Macro cards -->
  <rect x="28" y="370" width="74" height="62" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="65" y="393" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="0.4">PROTEIN</text>
  <text x="65" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#ffffff" font-weight="700">142g</text>

  <rect x="113" y="370" width="74" height="62" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="150" y="393" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="0.4">CARBS</text>
  <text x="150" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#ffffff" font-weight="700">180g</text>

  <rect x="198" y="370" width="74" height="62" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="235" y="393" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="500" letter-spacing="0.4">FAT</text>
  <text x="235" y="414" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#ffffff" font-weight="700">58g</text>

  <!-- Meals section -->
  <text x="30" y="458" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280" font-weight="600" letter-spacing="0.5">TODAY'S MEALS</text>

  <!-- Meal 1 -->
  <rect x="28" y="468" width="244" height="44" rx="10" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <rect x="40" y="480" width="20" height="20" rx="6" fill="rgba(212,64,53,0.12)"/>
  <text x="50" y="494" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D44035" font-weight="700">B</text>
  <text x="70" y="486" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="500">Breakfast</text>
  <text x="70" y="501" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">520 kcal · 38g protein</text>
  <circle cx="256" cy="490" r="5" fill="rgba(212,64,53,0.2)"/>

  <!-- Meal 2 -->
  <rect x="28" y="518" width="244" height="44" rx="10" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <rect x="40" y="530" width="20" height="20" rx="6" fill="rgba(212,64,53,0.12)"/>
  <text x="50" y="544" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D44035" font-weight="700">L</text>
  <text x="70" y="536" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="500">Lunch</text>
  <text x="70" y="551" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">640 kcal · 51g protein</text>
  <circle cx="256" cy="540" r="5" fill="rgba(212,64,53,0.2)"/>

  <!-- Bottom nav bar -->
  <rect x="12" y="574" width="276" height="28" rx="0" fill="#0f0f0f"/>
  <circle cx="90" cy="588" r="3.5" fill="#D44035"/>
  <circle cx="150" cy="588" r="3" fill="#2a2a2a"/>
  <circle cx="210" cy="588" r="3" fill="#2a2a2a"/>

  <!-- Home indicator -->
  <rect x="108" y="606" width="84" height="4" rx="2" fill="#2a2a2a"/>
</svg>
