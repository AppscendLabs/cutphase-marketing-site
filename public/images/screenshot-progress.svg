<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="480" rx="28" fill="#0f0f0f"/>

  <!-- Header -->
  <text x="24" y="52" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" letter-spacing="0.5">PROGRESS</text>
  <text x="24" y="74" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="16" fill="#ffffff">Week 4 of Cut</text>

  <!-- Stats row -->
  <rect x="16" y="88" width="96" height="66" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="28" y="110" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">Weight lost</text>
  <text x="28" y="134" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ffffff" font-weight="800">-3.2</text>
  <text x="28" y="148" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D44035">lbs this phase</text>

  <rect x="128" y="88" width="96" height="66" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="140" y="110" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">Avg. deficit</text>
  <text x="140" y="134" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#ffffff" font-weight="800">-320</text>
  <text x="140" y="148" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#D44035">kcal/day</text>

  <!-- Chart label -->
  <text x="24" y="180" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="600" letter-spacing="0.4">WEIGHT TREND</text>

  <!-- Chart area -->
  <rect x="16" y="188" width="208" height="120" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="28" y="205" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">185</text>
  <text x="28" y="237" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">183</text>
  <text x="28" y="269" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">181</text>
  <text x="28" y="298" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">179</text>

  <!-- Grid lines -->
  <line x1="50" y1="200" x2="214" y2="200" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="50" y1="232" x2="214" y2="232" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="50" y1="264" x2="214" y2="264" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="50" y1="296" x2="214" y2="296" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Trend line -->
  <polyline points="60,204 84,210 108,218 132,224 156,232 180,242 204,252"
    fill="none" stroke="#D44035" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow under line -->
  <polygon points="60,204 84,210 108,218 132,224 156,232 180,242 204,252 204,296 60,296"
    fill="url(#chartGrad)" opacity="0.25"/>
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D44035"/>
      <stop offset="100%" stop-color="#D44035" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Data point -->
  <circle cx="204" cy="252" r="4" fill="#D44035"/>

  <!-- X-axis labels -->
  <text x="60" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">W1</text>
  <text x="108" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">W2</text>
  <text x="156" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#444">W3</text>
  <text x="204" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">W4</text>

  <!-- Phase progress -->
  <text x="24" y="350" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="600" letter-spacing="0.4">PHASE PROGRESS</text>
  <rect x="16" y="358" width="208" height="52" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="28" y="378" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="500">Cut Phase</text>
  <text x="28" y="394" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">28 of 42 days</text>
  <rect x="28" y="400" width="180" height="4" rx="2" fill="#1e1e1e"/>
  <rect x="28" y="400" width="120" height="4" rx="2" fill="#D44035"/>

  <!-- Home indicator -->
  <rect x="80" y="460" width="80" height="3" rx="1.5" fill="#2a2a2a"/>
</svg>
