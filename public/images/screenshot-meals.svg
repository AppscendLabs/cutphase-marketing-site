<svg width="240" height="480" viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="240" height="480" rx="28" fill="#0f0f0f"/>

  <!-- Header -->
  <text x="24" y="52" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" letter-spacing="0.5">CUT PHASE · DAY 12</text>
  <text x="24" y="74" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="16" fill="#ffffff">Today's Plan</text>

  <!-- Macro progress bar -->
  <rect x="24" y="90" width="192" height="6" rx="3" fill="#1e1e1e"/>
  <rect x="24" y="90" width="144" height="6" rx="3" fill="#D44035"/>
  <text x="24" y="108" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280">1,840 / 2,100 kcal remaining</text>

  <!-- Breakfast -->
  <text x="24" y="132" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="600" letter-spacing="0.4">BREAKFAST</text>
  <rect x="16" y="140" width="208" height="54" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
