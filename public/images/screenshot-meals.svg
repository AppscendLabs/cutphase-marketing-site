  <text x="28" y="178" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">520 kcal · 38g P · 62g C · 12g F</text>

  <!-- Lunch -->
  <text x="24" y="214" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="600" letter-spacing="0.4">LUNCH</text>
  <rect x="16" y="222" width="208" height="54" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="28" y="244" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="500">Grilled Chicken + Rice</text>
  <text x="28" y="260" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">640 kcal · 51g P · 72g C · 11g F</text>

  <!-- Dinner -->
  <text x="24" y="296" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6b7280" font-weight="600" letter-spacing="0.4">DINNER</text>
  <rect x="16" y="304" width="208" height="54" rx="12" fill="#161616" stroke="#1f1f1f" stroke-width="1"/>
  <text x="28" y="326" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#ffffff" font-weight="500">Salmon + Vegetables</text>
  <text x="28" y="342" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#6b7280">580 kcal · 44g P · 28g C · 28g F</text>

